// Fisher-Yates shuffle to get random order
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let queue = shuffle(compliments.map((_, i) => i));
let seenCount = 1;
let currentIdx = queue.shift();

function next() {
  const btn = document.getElementById('btn');
  const textEl = document.getElementById('text');
  const subEl = document.getElementById('sub');
  const numEl = document.getElementById('num');

  btn.classList.add('spin');
  setTimeout(() => btn.classList.remove('spin'), 400);

  textEl.classList.add('fade-out');
  subEl.classList.add('fade-out');

  setTimeout(() => {
    if (queue.length === 0) {
      queue = shuffle(compliments.map((_, i) => i).filter(i => i !== currentIdx));
    }
    currentIdx = queue.shift();
    seenCount++;

    const c = compliments[currentIdx];
    textEl.textContent = c.main;
    subEl.textContent = c.sub;
    numEl.textContent = '№ ' + String(seenCount).padStart(3, '0');
    document.getElementById('counter').textContent = seenCount + ' из 365';

    textEl.classList.remove('fade-out');
    subEl.classList.remove('fade-out');
  }, 280);
}

// init first
document.getElementById('text').textContent = compliments[currentIdx].main;
document.getElementById('sub').textContent = compliments[currentIdx].sub;
